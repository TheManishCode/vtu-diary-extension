<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0a0a0a;
      --s1:       #111;
      --s2:       #181818;
      --s3:       #202020;
      --b1:       #222;
      --b2:       #2e2e2e;
      --b3:       #3a3a3a;
      --tx:       #f2f2f2;
      --t2:       #999;
      --t3:       #555;
      --or:       #ff7a00;
      --or2:      #ff9500;
      --or-glow:  rgba(255,122,0,.22);
      --ok:       #36d47c;
      --warn:     #f5a731;
      --err:      #f06464;
      --info:     #6aaef2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      width: 380px;
      background: var(--bg);
    }

    body {
      width: 380px;
      min-height: 560px;
      background: var(--bg);
      color: var(--tx);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── HEADER ───────────────────────── */
    .hd {
      position: relative;
      padding: 14px 16px 13px;
      border-bottom: 1px solid var(--b1);
      overflow: hidden;
    }

    .hd-glow {
      position: absolute;
      top: -30px; left: -20px;
      width: 200px; height: 100px;
      background: radial-gradient(circle, rgba(255,122,0,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .hd-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 11px;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(255,90,0,.28), inset 0 1px 0 rgba(255,255,255,.08);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-text { line-height: 1.1; }

    .logo-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--tx);
      letter-spacing: -0.2px;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 400;
      color: var(--t3);
      letter-spacing: 0.1px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--t2);
      transition: border-color 200ms;
    }

    .led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--t3);
      flex-shrink: 0;
      transition: background 300ms, box-shadow 300ms;
    }
    .led.ok   { background: var(--ok);   box-shadow: 0 0 6px rgba(54,212,124,.6); }
    .led.busy { background: var(--warn); box-shadow: 0 0 6px rgba(245,167,49,.6); animation: pulse 1.2s ease-in-out infinite; }
    .led.err  { background: var(--err);  box-shadow: 0 0 6px rgba(240,100,100,.6); }

    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    /* ── TABS ─────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 8px 12px 0;
      background: var(--bg);
      border-bottom: 1px solid var(--b1);
      position: relative;
    }

    .tab {
      position: relative;
      padding: 6px 11px 8px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--t3);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      border-radius: 6px 6px 0 0;
      transition: color 140ms;
      letter-spacing: 0.1px;
    }

    .tab:hover { color: var(--t2); }

    .tab.on { color: var(--tx); }

    .tab-ink {
      position: absolute;
      bottom: -1px; left: 0;
      height: 2px;
      background: var(--or);
      border-radius: 2px 2px 0 0;
      transition: left 220ms cubic-bezier(.4,0,.2,1), width 220ms cubic-bezier(.4,0,.2,1);
    }

    .tab-badge {
      display: inline-block;
      margin-left: 4px;
      background: var(--or);
      color: #1a0800;
      font-size: 9px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px;
      vertical-align: middle;
      line-height: 1.4;
    }

    /* ── PANELS ───────────────────────── */
    .views {
      position: relative;
      height: 390px;
    }

    .view {
      position: absolute;
      inset: 0;
      padding: 16px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transform: translateY(5px);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .view.on {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }

    /* ── FORM ─────────────────────────── */
    .eyebrow {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 12px;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .f { margin-bottom: 10px; }
    .f:last-of-type { margin-bottom: 0; }

    .f label {
      display: block;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--t2);
      margin-bottom: 5px;
      letter-spacing: 0.1px;
    }

    .f input[type="text"],
    .f input[type="file"] {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 9px;
      padding: 9px 12px;
      font-size: 12.5px;
      font-family: inherit;
      color: var(--tx);
      outline: none;
      transition: border-color 150ms, box-shadow 150ms, background 150ms;
    }

    .f input::placeholder { color: var(--t3); }

    .f input[type="text"]:hover { border-color: var(--b2); background: var(--s2); }

    .f input[type="text"]:focus {
      border-color: rgba(255,122,0,.55);
      background: var(--s2);
      box-shadow: 0 0 0 3px rgba(255,122,0,.1), 0 0 16px rgba(255,122,0,.1);
    }

    /* ── BUTTONS ──────────────────────── */
    .brow {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .brow.two { grid-template-columns: 1fr 1fr; }
    .brow.one { grid-template-columns: 1fr; }

    btn, button {
      font-family: inherit;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 9px;
      border: 1px solid transparent;
      cursor: pointer;
      text-align: center;
      transition: all 140ms ease;
      outline: none;
      letter-spacing: 0.1px;
    }

    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-p {
      background: var(--or);
      color: #1c0900;
      border-color: var(--or2);
      box-shadow: 0 1px 0 rgba(255,255,255,.08) inset, 0 6px 18px rgba(255,90,0,.3);
    }

    .btn-p:hover:not(:disabled) {
      background: var(--or2);
      box-shadow: 0 1px 0 rgba(255,255,255,.1) inset, 0 8px 24px rgba(255,90,0,.4);
    }

    .btn-s {
      background: var(--s2);
      color: var(--t2);
      border-color: var(--b1);
    }

    .btn-s:hover:not(:disabled) {
      background: var(--s3);
      border-color: var(--b2);
      color: var(--tx);
    }

    /* ── DIVIDER ──────────────────────── */
    .divider {
      height: 1px;
      background: var(--b1);
      margin: 14px 0;
    }

    /* ── HINT ─────────────────────────── */
    .hint {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 300;
      color: var(--t3);
      line-height: 1.55;
    }

    .hint code {
      font-family: 'DM Mono', monospace;
      font-size: 10.5px;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--or);
    }

    /* ── LOGS ─────────────────────────── */
    .log-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .log-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--t3);
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 5px;
      padding: 2px 7px;
    }

    #log {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .log-empty {
      text-align: center;
      padding: 50px 0 30px;
      color: var(--t3);
      font-size: 12px;
    }

    .log-empty-icon {
      font-size: 22px;
      margin-bottom: 8px;
      opacity: .4;
    }

    .li {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      padding: 8px 10px;
      animation: slide-in 180ms ease forwards;
    }

    @keyframes slide-in {
      from { opacity:0; transform: translateY(3px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .li-bar {
      width: 3px;
      border-radius: 3px;
      align-self: stretch;
      flex-shrink: 0;
      min-height: 14px;
      background: var(--b3);
    }

    .li-info  .li-bar { background: var(--info); }
    .li-ok    .li-bar { background: var(--ok);   }
    .li-warn  .li-bar { background: var(--warn); }
    .li-err   .li-bar { background: var(--err);  }

    .li-body { flex: 1; min-width: 0; }

    .li-time {
      font-family: 'DM Mono', monospace;
      font-size: 9.5px;
      color: var(--t3);
      margin-bottom: 2px;
      display: block;
    }

    .li-msg {
      font-size: 11.5px;
      color: var(--t2);
      line-height: 1.4;
      word-break: break-word;
    }

    .li-info .li-msg { color: #b8d4ff; }
    .li-ok   .li-msg { color: #b8f0d2; }
    .li-warn .li-msg { color: #fde8b5; }
    .li-err  .li-msg { color: #ffd0d0; }

    /* ── FOOTER / AFFILIATE ───────────── */
    footer {
      border-top: 1px solid var(--b1);
      padding: 10px 16px 12px;
      background: var(--bg);
    }

    .af-head {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--t3);
      margin-bottom: 8px;
    }

    .af-row { display: flex; gap: 0; }

    .af-a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      padding: 5px 0;
      position: relative;
      overflow: hidden;
    }

    .af-a + .af-a {
      margin-left: 14px;
      padding-left: 14px;
      border-left: 1px solid var(--b1);
    }

    .af-a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: rgba(255,122,0,.5);
      transition: width 200ms ease;
    }

    .af-a:hover::after { width: 100%; }

    .af-n {
      font-size: 11.5px;
      font-weight: 500;
      color: #888;
      transition: color 150ms;
      line-height: 1;
    }

    .af-a:hover .af-n { color: var(--tx); }

    .af-arr {
      font-style: normal;
      font-size: 12px;
      color: var(--t3);
      transition: color 150ms, transform 150ms;
    }

    .af-a:hover .af-arr { color: var(--or); transform: translate(2px,-2px); }

    .af-fine {
      font-size: 9.5px;
      color: var(--t3);
      margin-top: 7px;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hd">
    <div class="hd-glow"></div>
    <div class="hd-inner">
      <div class="logo">
        <div class="logo-mark">
          <img src="icons/icon-48.png" alt="Diary Made Easy logo" />
        </div>
        <div class="logo-text">
          <div class="logo-name">Diary Made Easy</div>
          <div class="logo-sub">VTU internship toolkit</div>
        </div>
      </div>
      <div class="pill" id="statusPill">
        <span class="led" id="led"></span>
        <span id="statusTxt">Idle</span>
      </div>
    </div>
  </header>

  <!-- NAV TABS -->
  <nav class="nav">
    <button class="tab on" data-view="gen">Generate</button>
    <button class="tab" data-view="up">Upload JSON</button>
    <button class="tab" data-view="lg">
      Logs <span class="tab-badge" id="logBadge" style="display:none">0</span>
    </button>
    <span class="tab-ink" id="ink"></span>
  </nav>

  <!-- PANELS -->
  <div class="views">

    <!-- Generate -->
    <div class="view on" id="view-gen">
      <div class="eyebrow">Entry details</div>
      <div class="row-2">
        <div class="f">
          <label>Name</label>
          <input id="name" type="text" placeholder="Full name" />
        </div>
        <div class="f">
          <label>USN</label>
          <input id="usn" type="text" placeholder="1XX00XX000" />
        </div>
      </div>
      <div class="f">
        <label>College</label>
        <input id="college" type="text" placeholder="College name" />
      </div>
      <div class="f">
        <label>Internship</label>
        <input id="internship" type="text" placeholder="Role / company" />
      </div>
      <div class="brow two">
        <button class="btn btn-p" id="generate">Generate Diary</button>
        <button class="btn btn-s" id="saveProfile">Save Profile</button>
      </div>
    </div>

    <!-- Upload -->
    <div class="view" id="view-up">
      <div class="eyebrow">Bulk upload</div>
      <div class="f">
        <label>JSON file</label>
        <input id="jsonFile" type="file" accept="application/json,.json" />
      </div>
      <div class="brow two">
        <button class="btn btn-p" id="upload">Upload Entries</button>
        <button class="btn btn-s" id="clearFile">Clear</button>
      </div>
      <div class="divider"></div>
      <div class="brow one">
        <button class="btn btn-s" id="downloadExample">Download Example JSON</button>
      </div>
      <p class="hint">
        Required fields: <code>Date</code> (YYYY-MM-DD), <code>Hours</code>, <code>Work Description</code>.
        Learnings and Skills are optional.
      </p>
    </div>

    <!-- Logs -->
    <div class="view" id="view-lg">
      <div class="log-bar">
        <div class="eyebrow" style="margin:0">Output</div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="log-count" id="logCount">0 entries</span>
          <button class="btn btn-s" id="clearLogs" style="padding:4px 10px;font-size:11px;width:auto">Clear</button>
        </div>
      </div>
      <div id="log">
        <div class="log-empty">
          <div class="log-empty-icon">◎</div>
          No activity yet
        </div>
      </div>
    </div>

  </div>

  <!-- AFFILIATE FOOTER -->
  <footer>
    <div class="af-head">Recommended</div>
    <div class="af-row">
      <a href="https://amzn.to/4eQYgGe" target="_blank" rel="noopener noreferrer" class="af-a">
        <span class="af-n">Dev-ready laptop</span>
        <i class="af-arr">↗</i>
      </a>
      <a href="https://amzn.to/3R4cIRp" target="_blank" rel="noopener noreferrer" class="af-a">
        <span class="af-n">Ergonomic Study Table</span>
        <i class="af-arr">↗</i>
      </a>
    </div>
    <p class="af-fine">Affiliate links — no extra cost to you.</p>
  </footer>

<script src="popup.js" defer></script>
</body>
</html>
